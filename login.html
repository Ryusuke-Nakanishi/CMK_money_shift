<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>ログイン | ClassmallKids シフト管理</title>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyB4JpPFCP0tigTHFaHkwVihEBfa24-oaJ8",
    authDomain: "shift-app-1fa59.firebaseapp.com",
    projectId: "shift-app-1fa59",
    storageBucket: "shift-app-1fa59.firebasestorage.app",
    messagingSenderId: "1014397065555",
    appId: "1:1014397065555:web:d681d7b76c565313b569a6"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // すでに有効なトークンがあればリダイレクト
  const expiresAt = localStorage.getItem('gcal_token_expires');
  const token     = localStorage.getItem('gcal_token');
  if (token && expiresAt && Date.now() < parseInt(expiresAt)) {
    window.location.href = '/';
  }

  // URLパラメータでエラー表示
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('error') === 'not_allowed') {
    document.getElementById('login-error').textContent = 'このアカウントはアプリの利用が許可されていません。管理者にお問い合わせください。';
    document.getElementById('login-error').style.display = 'block';
  }

  window.doLogin = async function() {
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'ログイン中...';
    document.getElementById('login-error').style.display = 'none';
    try {
      const provider = new GoogleAuthProvider();
      provider.addScope('https://www.googleapis.com/auth/calendar.events');
      provider.setCustomParameters({ prompt: 'select_account' });
      const result = await signInWithPopup(auth, provider);
      const credential = GoogleAuthProvider.credentialFromResult(result);
      if (credential && credential.accessToken) {
        const accessToken = credential.accessToken;
        // tokeninfo APIでexpiresAtを取得
        try {
          const res = await fetch(`https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=${accessToken}`);
          const info = await res.json();
          const expiresIn = info.expires_in || 3600;
          const expiresAt = Date.now() + (expiresIn * 1000);
          localStorage.setItem('gcal_token', accessToken);
          localStorage.setItem('gcal_token_expires', expiresAt);
          localStorage.setItem('gcal_uid', result.user.uid);
          localStorage.setItem('login_time', Date.now());
        } catch(e) {
          // tokeninfo失敗時は3600秒（1時間）でフォールバック
          const expiresAt = Date.now() + (3600 * 1000);
          localStorage.setItem('gcal_token', accessToken);
          localStorage.setItem('gcal_token_expires', expiresAt);
          localStorage.setItem('gcal_uid', result.user.uid);
          localStorage.setItem('login_time', Date.now());
        }
        window.location.href = '/';
      } else {
        throw new Error('トークンの取得に失敗しました');
      }
    } catch(e) {
      if (e.code !== 'auth/popup-closed-by-user') {
        document.getElementById('login-error').textContent = 'ログインに失敗しました: ' + e.message;
        document.getElementById('login-error').style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = 'Googleアカウントでログイン';
    }
  };
</script>
<style>
  :root {
    --bg:#ffffff;--bg2:#f5f5f5;--text:#111111;--text2:#666666;--text3:#999999;
    --border:rgba(0,0,0,0.12);--accent:#111111;--accent-text:#ffffff;
    --danger-bg:#fdecea;--danger-text:#c0392b;--radius:10px;--radius-sm:6px;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#111111;--bg2:#1e1e1e;--text:#f0f0f0;--text2:#aaaaaa;--text3:#666666;--border:rgba(255,255,255,0.1);--accent:#f0f0f0;--accent-text:#111111;--danger-bg:#2e0d0d;--danger-text:#f87171;}
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:32px 24px;width:100%;max-width:360px;text-align:center;}
  .app-icon{width:64px;height:64px;background:var(--accent);border-radius:16px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px;}
  .app-name{font-size:18px;font-weight:700;margin-bottom:4px;}
  .app-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
  .login-btn{width:100%;padding:12px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;font-weight:500;transition:background .15s;}
  .login-btn:hover{background:var(--bg2);}
  .login-btn:disabled{opacity:0.6;cursor:not-allowed;}
  .login-btn svg{width:20px;height:20px;flex-shrink:0;}
  .error{background:var(--danger-bg);color:var(--danger-text);font-size:13px;padding:8px 12px;border-radius:var(--radius-sm);margin-top:12px;display:none;text-align:left;}
  .note{font-size:12px;color:var(--text3);margin-top:20px;line-height:1.6;}
  .footer-links{margin-top:24px;font-size:12px;color:var(--text3);}
  .footer-links a{color:var(--text3);text-decoration:none;margin:0 8px;}
</style>
</head>
<body>
<div class="login-card">
  <div class="app-icon">📅</div>
  <div class="app-name">ClassmallKids</div>
  <div class="app-sub">シフト・請求書管理</div>
  <button class="login-btn" id="login-btn" onclick="doLogin()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Googleアカウントでログイン
  </button>
  <div class="error" id="login-error"></div>
  <p class="note">ログインするとGoogleカレンダーへの自動登録・複数端末でのデータ同期が有効になります。セッションは約1時間で自動的に終了します。</p>
  <div class="footer-links">
    <a href="/privacy.html">プライバシーポリシー</a>
    <a href="/terms.html">利用規約</a>
  </div>
</div>
</body>
</html>
