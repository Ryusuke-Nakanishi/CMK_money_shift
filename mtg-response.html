<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG日程回答 | ClassmallKids</title>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
  import { getFirestore, doc, getDoc, updateDoc }
    from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyB4JpPFCP0tigTHFaHkwVihEBfa24-oaJ8",
    authDomain: "shift-app-1fa59.firebaseapp.com",
    projectId: "shift-app-1fa59",
    storageBucket: "shift-app-1fa59.firebasestorage.app",
    messagingSenderId: "1014397065555",
    appId: "1:1014397065555:web:d681d7b76c565313b569a6"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // URLからMTG IDを取得
  const urlParams = new URLSearchParams(window.location.search);
  const mtgId = urlParams.get('id');

  async function loadMTG() {
    if (!mtgId) { showError('MTG IDが指定されていません'); return; }
    try {
      const snap = await getDoc(doc(db, 'mtgList', mtgId));
      if (!snap.exists()) { showError('MTGが見つかりません'); return; }
      const mtg = { id: snap.id, ...snap.data() };
      renderMTG(mtg);
    } catch(e) { showError('読み込みに失敗しました: ' + e.message); }
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = msg;
  }

  function renderMTG(mtg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('mtg-title').textContent = mtg.title;
    document.getElementById('mtg-info').textContent =
      `${mtg.type} · ${mtg.duration}分 · 期限: ${mtg.deadline||'未設定'}`;
    if (mtg.description) {
      document.getElementById('mtg-desc').textContent = mtg.description;
      document.getElementById('mtg-desc').style.display = 'block';
    }
    if (mtg.status === '確定') {
      const confirmed = (mtg.candidates||[]).find(c => c.id === mtg.confirmedCandidate);
      document.getElementById('confirmed-msg').style.display = 'block';
      if (confirmed) {
        document.getElementById('confirmed-date').textContent =
          `${confirmed.date} ${confirmed.start}${confirmed.end?'〜'+confirmed.end:''}`;
      }
      document.getElementById('response-form').style.display = 'none';
      return;
    }
    // 候補日フォーム
    const candidates = mtg.candidates || [];
    const formEl = document.getElementById('candidates-form');
    formEl.innerHTML = candidates.map(c => `
      <label style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #eee;cursor:pointer;font-size:14px">
        <input type="checkbox" value="${c.id}" style="width:18px;height:18px">
        <span>${c.date} ${c.start}${c.end?'〜'+c.end:''}</span>
      </label>`).join('');

    // 送信処理
    window.submitResponse = async function() {
      const name = document.getElementById('resp-name').value.trim();
      const email = document.getElementById('resp-email').value.trim();
      if (!name) { alert('お名前を入力してください'); return; }
      const checkboxes = document.querySelectorAll('#candidates-form input:checked');
      const selectedIds = Array.from(checkboxes).map(cb => cb.value);
      const key = email || name;
      const updateData = {};
      updateData[`responses.${key.replace(/\./g,'_')}`] = {
        name, email, candidates: selectedIds, answeredAt: Date.now(), isExternal: true
      };
      try {
        await updateDoc(doc(db, 'mtgList', mtgId), updateData);
        document.getElementById('response-form').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      } catch(e) { alert('送信に失敗しました: ' + e.message); }
    };
  }

  loadMTG();
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#111;min-height:100vh;padding:20px}
  .card{background:#fff;border-radius:12px;padding:20px;max-width:480px;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
  .header{background:#111;color:#fff;padding:12px 16px;border-radius:10px 10px 0 0;margin:-20px -20px 16px}
  h1{font-size:16px;font-weight:600}
  h2{font-size:18px;font-weight:600;margin-bottom:6px}
  .info{font-size:13px;color:#666;margin-bottom:12px}
  .desc{font-size:13px;color:#444;line-height:1.6;margin-bottom:12px;padding:10px;background:#f9f9f9;border-radius:6px;display:none}
  .form-group{margin-bottom:12px}
  .form-group label{font-size:12px;color:#666;display:block;margin-bottom:4px}
  .form-group input{width:100%;padding:9px 11px;border:0.5px solid rgba(0,0,0,0.2);border-radius:6px;font-size:15px;font-family:inherit}
  .btn{width:100%;padding:12px;border-radius:8px;border:none;background:#111;color:#fff;font-size:15px;cursor:pointer;font-family:inherit;font-weight:500;margin-top:4px}
  .section-title{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px}
  .success{background:#edfaef;color:#1a7a32;padding:16px;border-radius:8px;text-align:center;font-size:14px;display:none}
  .confirmed{background:#edfaef;color:#1a7a32;padding:12px 16px;border-radius:8px;margin-bottom:12px;display:none}
  .error{color:#c0392b;font-size:14px;text-align:center;padding:20px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>📅 MTG日程回答 | ClassmallKids</h1>
  </div>
  <div id="loading" style="text-align:center;padding:20px;font-size:14px;color:#666">読み込み中...</div>
  <div id="error" class="error"></div>
  <div id="content" style="display:none">
    <h2 id="mtg-title"></h2>
    <p class="info" id="mtg-info"></p>
    <p class="desc" id="mtg-desc"></p>
    <div id="confirmed-msg" class="confirmed" style="display:none">
      ✅ このMTGは確定しました！<br>
      確定日程: <strong id="confirmed-date"></strong>
    </div>
    <div id="response-form">
      <div class="form-group">
        <label>お名前 *</label>
        <input type="text" id="resp-name" placeholder="山田太郎">
      </div>
      <div class="form-group">
        <label>メールアドレス（任意）</label>
        <input type="email" id="resp-email" placeholder="example@gmail.com">
      </div>
      <div class="section-title">参加可能な日程を選んでください（複数選択可）</div>
      <div id="candidates-form"></div>
      <button class="btn" onclick="submitResponse()" style="margin-top:16px">回答を送信</button>
    </div>
    <div id="success-msg" class="success">
      ✅ 回答を送信しました！<br>ご協力ありがとうございます。
    </div>
  </div>
</div>
</body>
</html>
